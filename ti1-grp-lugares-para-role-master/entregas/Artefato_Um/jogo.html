<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha do Lugar</title>
    <link rel="stylesheet" href="style_jogo.css">
</head>
<body>
    <div class="container">
        <!-- Página de Votação -->
        <div id="votingPage" class="content">
            <h1>Como Jogar:</h1>
            <p class="instructions">
                Para começar a jogar, preencha a caixa e adicione suas opções. Use o botão '+' para votar em um lugar e o botão '-' para remover um voto. Se uma opção atingir -1 voto, ela será removida da lista. Após suas escolhas, clique em "Confirmar".
            </p>

            <div class="options-container" id="optionsContainer">
                <!-- Opções serão adicionadas aqui -->
            </div>

            <div class="button-container">
                <button class="btn-confirm" onclick="confirmVotes()">Confirmar</button>
            </div>
        </div>

        <!-- Página de Resultado -->
<div id="resultPage" class="content result-container hidden">
    <h1>Lugar Vencedor:</h1>

    <!-- Nome do lugar -->
    <div class="winner-name" id="winnerName"></div>

    <!-- Endereço -->
    <div class="winner-address">
        <span>Como chegar lá</span>
        <span id="winnerAddressText"></span>
    </div>

    <!-- Mapa -->
    <div id="winnerMap" style="margin: 20px 0; height: 300px;"></div>

    <button class="btn-reset" onclick="resetGame()">Começar Novamente</button>
</div>


    <script src="script_jogo.js"></script>
</body>
</html>
